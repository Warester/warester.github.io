<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Metapedia Bhakti</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f9f6f2;
      color: #333;
    }
    header {
      background: url("https://images.unsplash.com/photo-1501785888041-af3ef285b470") no-repeat center;
      background-size: cover;
      background-position: 50% 20%; /* shows upper part but slightly lower */
      color: white;
      text-align: center;
      padding: 5rem 2rem;
      position: relative;
    }
    header::before {
      content: "";
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.4); /* overlay for readability */
    }
    header h1, header p {
      position: relative;
      z-index: 1;
    }
    nav {
      background: #333;
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
    }
    nav a {
      color: white;
      padding: 1rem;
      text-decoration: none;
    }
    nav a:hover {
      background: #555;
    }
    section {
      padding: 2rem;
    }
    .story {
      margin-bottom: 2rem;
      padding: 1rem;
      background: #fff;
      border-left: 4px solid #d4af37;
    }
.story-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); /* responsive columns */
  gap: 1rem;
}

.story-item {
  border: 1px solid #ddd;
  padding: 1rem;
  background: #fff;
  text-align: center;
  transition: transform 0.3s ease;
  cursor: pointer;
}

.story-item img {
  width: 100%;              
  height: 200px;            
  object-fit: cover;        
  object-position: 50% 20%;
  border-radius:6px;
  transition: transform 0.3s ease;  
}


.story-item h3 {
  margin: 0.5rem 0;
  color: #d4af37;
}

.story-item p {
  font-size: 0.9rem;
  color: #555;
}

.story-item:hover {
  transform: translateY(-5px); /* lifts the card slightly */
  box-shadow: 0 6px 15px rgba(0,0,0,0.2); /* adds shadow */
}

.story-item:hover img {
  transform: scale(1.05); /* zooms the image slightly */
}

    footer {
      background: #333;
      color: white;
      text-align: center;
      padding: 1rem;
      margin-top: 2rem;
    }
  </style>
</head>
<body>

  <header>
    <h1>🌸 Metapedia Bhakti 🌸</h1>
    <p>Stories of God, devotion, and timeless wisdom</p>
  </header>

  <nav>
    <a href="index.html">Home</a>
    <a href="stories.html">Stories</a>
    <a href="vlogs.html">Vlogs</a>
    <a href="videos.html">Videos</a>
    <a href="colder_shop.html">Shop</a>
    <a href="contact.html">Contact</a>
  </nav>



  <footer>
    <p>&copy; 2026 Metapedia Bhakti. All rights reserved.</p>
  </footer>

</body>
</html>
